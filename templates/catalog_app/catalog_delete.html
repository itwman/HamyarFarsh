{% extends 'dashboard/base.html' %}
{% block title %}حذف کاتالوگ{% endblock %}
{% block page_title %}حذف کاتالوگ{% endblock %}
{% block content %}
<div class="card p-4" style="max-width:500px;margin:0 auto;">
<div class="text-center mb-3">
<i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i>
<h5 class="mt-2">حذف کاتالوگ «{{ catalog.title }}»؟</h5>
<p class="text-muted">{{ catalog.products.count }} محصول | {{ catalog.view_count }} بازدید</p>
</div>
<form method="post">
{% csrf_token %}
<div class="d-flex gap-2 justify-content-center">
<button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> حذف</button>
<a href="{% url 'catalog_app:list' %}" class="btn btn-outline-secondary">انصراف</a>
</div>
</form>
</div>
{% endblock %}
