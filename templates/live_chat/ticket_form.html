{% extends 'base.html' %}
{% block meta_title %}{{ title }} | همیار فرش{% endblock %}
{% block content %}
<div class="container py-4">
    <h1 class="h4 mb-4" style="color:var(--hf-primary);"><i class="bi bi-plus-circle"></i> {{ title }}</h1>
    <div class="card"><div class="card-body">
        <form method="post">{% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label fw-bold">موضوع</label>{{ form.subject }}</div>
                <div class="col-md-3"><label class="form-label">بخش</label>{{ form.department }}</div>
                <div class="col-md-3"><label class="form-label">اولویت</label>{{ form.priority }}</div>
                <div class="col-md-6"><label class="form-label">سفارش مرتبط (اختیاری)</label>{{ form.order }}</div>
                <div class="col-12"><label class="form-label fw-bold">متن پیام</label>{{ form.message }}</div>
            </div>
            <div class="mt-3"><button type="submit" class="btn btn-hf-primary"><i class="bi bi-send"></i> ارسال تیکت</button></div>
        </form>
    </div></div>
</div>
{% endblock %}
