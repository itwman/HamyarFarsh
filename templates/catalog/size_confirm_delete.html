{% extends 'base.html' %}

{% block meta_title %}حذف سایز | {{ site_settings.site_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="hf-card p-4 text-center">
            <i class="bi bi-exclamation-triangle" style="font-size:3rem;color:var(--hf-danger);"></i>
            <h5 class="mt-3">آیا از حذف سایز «{{ size.name }}» مطمئن هستید؟</h5>
            <p class="text-muted">{{ size.dimensions_display }} — {{ size.area_display }}</p>
            <form method="post" class="d-flex gap-2 justify-content-center mt-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> حذف</button>
                <a href="{% url 'size_list' %}" class="btn btn-hf-outline">انصراف</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
