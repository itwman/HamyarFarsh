{% extends 'dashboard/base.html' %}
{% block page_title %}افزودن دستی شماره{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="mb-0"><i class="bi bi-plus-circle"></i> افزودن دستی شماره</h5>
    <a href="{% url 'newsletter:admin_dashboard' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-right"></i> بازگشت</a>
</div>
<div class="card"><div class="card-body">
    <form method="post">{% csrf_token %}
        <label class="form-label fw-bold">شماره‌های موبایل (هر خط یک شماره)</label>
        {{ form.phones }}
        <div class="mt-3"><button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> افزودن</button></div>
    </form>
</div></div>
{% endblock %}
