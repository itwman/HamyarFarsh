{% extends 'base.html' %}

{% block meta_title %}{% if address %}ویرایش آدرس{% else %}افزودن آدرس{% endif %}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="hf-card p-4">
                <h3 class="mb-4" style="color:var(--hf-primary);">
                    {% if address %}
                    <i class="bi bi-pencil"></i> ویرایش آدرس
                    {% else %}
                    <i class="bi bi-plus-circle"></i> افزودن آدرس جدید
                    {% endif %}
                </h3>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">استان <span class="text-danger">*</span></label>
                            <input type="text" name="province" class="form-control" 
                                   value="{{ address.province|default:'' }}" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">شهر <span class="text-danger">*</span></label>
                            <input type="text" name="city" class="form-control" 
                                   value="{{ address.city|default:'' }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">آدرس کامل <span class="text-danger">*</span></label>
                        <textarea name="full_address" class="form-control" rows="3" 
                                  required>{{ address.full_address|default:'' }}</textarea>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">کد پستی</label>
                            <input type="text" name="postal_code" class="form-control" 
                                   value="{{ address.postal_code|default:'' }}" maxlength="10"
                                   placeholder="مثال: 1234567890">
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">شماره تماس</label>
                            <input type="text" name="phone" class="form-control" 
                                   value="{{ address.phone|default:'' }}" maxlength="11"
                                   placeholder="مثال: 09121234567">
                        </div>
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" name="is_default" class="form-check-input" 
                               id="isDefault" {% if address.is_default %}checked{% endif %}>
                        <label class="form-check-label" for="isDefault">
                            تنظیم به عنوان آدرس پیش‌فرض
                        </label>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-hf-primary">
                            <i class="bi bi-check-circle"></i> ذخیره
                        </button>
                        <a href="{% url 'customer_panel:addresses_list' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle"></i> انصراف
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
